<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Replenishment System</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="Mets.Replenishment.UI.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body style="margin: 0; background-color: #121212;">
    <div id="app">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #121212; color: #ffffff; font-family: 'Roboto', sans-serif;">
            <div class="mets-spinner"></div>
            <div style="margin-top: 24px; font-size: 1.25rem; font-weight: 500; letter-spacing: 1px; color: #ffffff;">METS REPLENISHMENT</div>
            <div style="margin-top: 8px; font-size: 0.875rem; color: #a0a0b0; letter-spacing: 0.5px;">Loading application resources...</div>
        </div>
        <style>
            .mets-spinner {
                width: 50px;
                height: 50px;
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-radius: 50%;
                border-top-color: #594AE2;
                animation: spin 1s ease-in-out infinite;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        </style>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?v=8.1.0"></script>
</body>

</html>
